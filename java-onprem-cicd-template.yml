name: Java On-Prem CI/CD Template

on:
  workflow_call:
    inputs:
      environment:
        required: true
        type: string
      service_name:
        required: true
        type: string
      base_dir:
        required: true
        type: string
      jar_name:
        required: true
        type: string
      properties_file:
        required: true
        type: string
      systemd_service:
        required: true
        type: string
      deploy_hosts:
        required: true
        type: string
      health_url:
        required: true
        type: string
      secret_mappings:
        required: true
        type: string

# -------------------------------------------------------------------

jobs:
  prepare:
    name: Prepare Workspace
    runs-on: self-hosted
    environment: ${{ inputs.environment }}

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: 18

# -------------------------------------------------------------------

  inject-secrets:
    name: Inject Secrets
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    needs: prepare

    steps:
      - uses: actions/checkout@v4

      - name: Inject secrets into properties file
        shell: bash
        run: |
          set -e
          FILE="${{ inputs.properties_file }}"
          cp "$FILE" "$FILE.bak"

          while IFS='=' read -r KEY SECRET_NAME; do
            [ -z "$KEY" ] && continue
            VALUE="${{ secrets[SECRET_NAME] }}"
            sed -i "s|\${$KEY}|$VALUE|g" "$FILE"
          done <<< "${{ inputs.secret_mappings }}"

# -------------------------------------------------------------------

  build:
    name: Build JAR
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    needs: inject-secrets

    steps:
      - uses: actions/checkout@v4
      - run: mvn clean package -DskipTests

# -------------------------------------------------------------------

  package:
    name: Package Artifact
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    needs: build

    steps:
      # ===== AS REQUESTED: UNCHANGED LOGIC =====
      - name: Prepare artifact directory
        run: |
          set -e
          BASE_DIR="${{ inputs.base_dir }}"
          ARTIFACT_DIR="$BASE_DIR/tmp_artifact"

          if [ -d "$BASE_DIR" ]; then
            rm -rf "$BASE_DIR"
          fi

          mkdir -p "$ARTIFACT_DIR"

      - name: Copy JAR + other files to artifact dir
        shell: bash
        run: |
          ARTIFACT_DIR="${{ inputs.base_dir }}/tmp_artifact"
          cp target/*.jar "$ARTIFACT_DIR/"

          extensions=(properties json txt doc bin csv xml xlsx xls conf sql html pdf png jpg jpeg webp svg db ini env zip tar gz sh yml)
          for ext in "${extensions[@]}"; do
            if compgen -G "*.$ext" > /dev/null; then
              cp *."$ext" "$ARTIFACT_DIR/"
            fi
          done

      - name: Normalize JAR name
        run: |
          cd "${{ inputs.base_dir }}/tmp_artifact"
          ORIGINAL=$(ls *.jar | head -n 1)
          if [ "$ORIGINAL" != "${{ inputs.jar_name }}" ]; then
            rm -f "${{ inputs.jar_name }}"
            mv "$ORIGINAL" "${{ inputs.jar_name }}"
          fi

# -------------------------------------------------------------------

  deploy:
    name: Deploy & Backup
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    needs: package

    steps:
      - name: Deploy to all servers
        shell: bash
        run: |
          set -e
          IFS=',' read -ra HOSTS <<< "${{ inputs.deploy_hosts }}"

          for HOST in "${HOSTS[@]}"; do
            echo "Deploying to $HOST"

            ssh -p 2210 middle@$HOST "
              mkdir -p /home/middle/${{ inputs.service_name }}/{artifact,backup,live}
            "

            scp -P 2210 -r \
              "${{ inputs.base_dir }}/tmp_artifact/"* \
              middle@$HOST:/home/middle/${{ inputs.service_name }}/artifact/

            ssh -p 2210 middle@$HOST << EOF
              BASE=/home/middle/${{ inputs.service_name }}
              DATE=\$(date +%Y%m%d)

              cp \$BASE/artifact/${{ inputs.jar_name }} \
                 \$BASE/backup/${{ inputs.jar_name }}-\$DATE.jar || true

              cp \$BASE/artifact/${{ inputs.properties_file }} \
                 \$BASE/backup/${{ inputs.properties_file }}-\$DATE || true

              cd \$BASE/backup
              ls -t *.jar-* 2>/dev/null | tail -n +11 | xargs -r rm --
            EOF

# -------------------------------------------------------------------

  restart-health:
    name: Restart & Health Check
    runs-on: self-hosted
    environment: ${{ inputs.environment }}
    needs: deploy

    steps:
      - name: Restart service & verify health
        shell: bash
        run: |
          IFS=',' read -ra HOSTS <<< "${{ inputs.deploy_hosts }}"

          for HOST in "${HOSTS[@]}"; do
            echo "Restarting on $HOST"

            ssh -p 2210 middle@$HOST "
              sudo systemctl restart ${{ inputs.systemd_service }}
            "

            echo "Health response from $HOST:"
            ssh -p 2210 middle@$HOST \
              "curl -s -w '\nHTTP_STATUS=%{http_code}\n' http://localhost${{ inputs.health_url }}"
          done
